<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/assets/icons/favicon.png"/>
  <meta name="theme-color" content="#1565C0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Question of Day — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body style="padding-bottom:0;">
  <header class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <button onclick="window.location.href='dashboard.html'"
        style="background:rgba(255,255,255,0.15);border:none;color:white;
               width:34px;height:34px;border-radius:50%;cursor:pointer;
               font-size:18px;display:flex;align-items:center;justify-content:center;">←</button>
      <div class="header-logo">Question of <span>Day</span></div>
    </div>
    <span id="adminEmail" style="font-size:12px;opacity:0.8;"></span>
  </header>

  <main class="page-container">
    <div style="margin-top:8px;margin-bottom:20px;">
      <h1 class="page-title">Question of the Day</h1>
      <p class="page-subtitle">Pick a question from the bank and schedule it</p>
    </div>

    <!-- ADD FORM -->
    <div class="card" style="margin-bottom:24px;">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;">➕ Add QOD Entry</h3>

      <label style="font-size:12px;font-weight:600;color:var(--text-secondary);">Active Date *</label>
      <input id="qodDate" type="date"
        style="width:100%;padding:10px 12px;border:1.5px solid var(--border);
               border-radius:var(--radius-sm);font-size:14px;margin:6px 0 14px;
               font-family:Inter,sans-serif;"/>

      <label style="font-size:12px;font-weight:600;color:var(--text-secondary);">Question ID *</label>
      <input id="qodQuestionId" type="text" placeholder="Paste Firestore Question document ID"
        style="width:100%;padding:10px 12px;border:1.5px solid var(--border);
               border-radius:var(--radius-sm);font-size:14px;margin:6px 0 4px;
               font-family:Inter,sans-serif;"/>
      <p style="font-size:11px;color:var(--text-secondary);margin-bottom:14px;">
        Find this in Firebase Console → questions collection → document ID
      </p>

      <label style="font-size:12px;font-weight:600;color:var(--text-secondary);">
        Explanation (shown after attempt)
      </label>
      <textarea id="qodExplanation" rows="3"
        placeholder="Write a clear explanation for the correct answer..."
        style="width:100%;padding:10px 12px;border:1.5px solid var(--border);
               border-radius:var(--radius-sm);font-size:14px;margin:6px 0 16px;
               font-family:Inter,sans-serif;resize:vertical;"></textarea>

      <button onclick="addQOD()" class="btn btn-primary" style="width:100%;">Save QOD</button>
    </div>

    <!-- LIST -->
    <div class="section-header">
      <h2 class="section-title">All QOD Entries</h2>
    </div>
    <div id="qodLoader">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
    <div id="qodList" class="card-list" style="display:none;"></div>
    <div id="qodEmpty" class="empty-state" style="display:none;">
      <div class="empty-state-icon">🧠</div>
      <h3>No QOD entries yet</h3>
      <p>Add the first one above</p>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/admin/question-of-day.js"></script>
</body>
</html>
