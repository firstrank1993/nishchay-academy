<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/assets/icons/favicon.png"/>
  <meta name="theme-color" content="#1565C0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Quiz — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body style="padding-bottom:0;">
  <header class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <button onclick="window.location.href='dashboard.html'"
        style="background:rgba(255,255,255,0.15);border:none;color:white;
               width:34px;height:34px;border-radius:50%;cursor:pointer;
               font-size:18px;display:flex;align-items:center;justify-content:center;">←</button>
      <div class="header-logo">Daily <span>Quiz</span></div>
    </div>
    <span id="adminEmail" style="font-size:12px;opacity:0.8;"></span>
  </header>

  <main class="page-container">
    <div style="margin-top:8px;margin-bottom:20px;">
      <h1 class="page-title">📝 Daily Quiz</h1>
      <p class="page-subtitle">Create quizzes using existing question bank</p>
    </div>

    <div class="card" style="margin-bottom:24px;">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;">➕ Create Quiz</h3>

      <label style="font-size:12px;font-weight:600;color:var(--text-secondary);">Quiz Title *</label>
      <input id="quizTitle" type="text" placeholder="e.g. Gujarat History Special Quiz"
        style="width:100%;padding:10px 12px;border:1.5px solid var(--border);
               border-radius:var(--radius-sm);font-size:14px;margin:6px 0 14px;
               font-family:Inter,sans-serif;"/>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--text-secondary);">Start Date *</label>
          <input id="quizStart" type="date"
            style="width:100%;padding:10px 12px;border:1.5px solid var(--border);
                   border-radius:var(--radius-sm);font-size:14px;margin-top:6px;
                   font-family:Inter,sans-serif;"/>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--text-secondary);">End Date *</label>
          <input id="quizEnd" type="date"
            style="width:100%;padding:10px 12px;border:1.5px solid var(--border);
                   border-radius:var(--radius-sm);font-size:14px;margin-top:6px;
                   font-family:Inter,sans-serif;"/>
        </div>
      </div>

      <label style="font-size:12px;font-weight:600;color:var(--text-secondary);">Subject</label>
      <select id="quizSubject"
        style="width:100%;padding:10px 12px;border:1.5px solid var(--border);
               border-radius:var(--radius-sm);font-size:14px;margin:6px 0 14px;
               font-family:Inter,sans-serif;background:white;">
        <option value="">All Subjects</option>
      </select>

      <label style="font-size:12px;font-weight:600;color:var(--text-secondary);">Difficulty</label>
      <select id="quizDifficulty"
        style="width:100%;padding:10px 12px;border:1.5px solid var(--border);
               border-radius:var(--radius-sm);font-size:14px;margin:6px 0 14px;
               font-family:Inter,sans-serif;background:white;">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>

      <label style="font-size:12px;font-weight:600;color:var(--text-secondary);">
        Number of Questions *
      </label>
      <input id="quizCount" type="number" min="5" max="30" value="10"
        style="width:100%;padding:10px 12px;border:1.5px solid var(--border);
               border-radius:var(--radius-sm);font-size:14px;margin:6px 0 6px;
               font-family:Inter,sans-serif;"/>
      <p style="font-size:11px;color:var(--text-secondary);margin-bottom:16px;">
        Questions will be randomly selected from the question bank for the chosen subject
      </p>

      <button onclick="createQuiz()" class="btn btn-primary" style="width:100%;">
        Create Daily Quiz
      </button>
    </div>

    <div class="section-header">
      <h2 class="section-title">All Quizzes</h2>
    </div>
    <div id="quizLoader">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
    <div id="quizList" class="card-list" style="display:none;"></div>
    <div id="quizEmpty" class="empty-state" style="display:none;">
      <div class="empty-state-icon">📝</div>
      <h3>No quizzes yet</h3>
      <p>Create the first daily quiz above</p>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/admin/daily-quiz.js"></script>
</body>
</html>
