<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/assets/icons/favicon.png"/>
  <meta name="theme-color" content="#1565C0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body style="padding-bottom:0;">
  <header class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <button onclick="window.location.href='dashboard.html'"
        style="background:rgba(255,255,255,0.15);border:none;color:white;
               width:34px;height:34px;border-radius:50%;cursor:pointer;
               font-size:18px;display:flex;align-items:center;justify-content:center;">←</button>
      <div class="header-logo">Leader<span>board</span></div>
    </div>
    <span id="adminEmail" style="font-size:12px;opacity:0.8;"></span>
  </header>

  <main class="page-container">
    <div style="margin-top:8px;margin-bottom:20px;">
      <h1 class="page-title">🏆 Leaderboard</h1>
      <p class="page-subtitle">Student rankings by points and streaks</p>
    </div>

    <!-- Tab Switcher -->
    <div style="display:flex;background:var(--bg);border-radius:var(--radius-sm);
                padding:4px;margin-bottom:20px;gap:4px;">
      <button onclick="switchTab('weekly')" id="tab-weekly"
        style="flex:1;padding:8px 4px;border:none;border-radius:var(--radius-sm);
               font-size:13px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;
               background:var(--primary);color:white;">This Week</button>
      <button onclick="switchTab('monthly')" id="tab-monthly"
        style="flex:1;padding:8px 4px;border:none;border-radius:var(--radius-sm);
               font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;
               background:transparent;color:var(--text-secondary);">This Month</button>
      <button onclick="switchTab('alltime')" id="tab-alltime"
        style="flex:1;padding:8px 4px;border:none;border-radius:var(--radius-sm);
               font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;
               background:transparent;color:var(--text-secondary);">All Time</button>
    </div>

    <!-- Summary stats -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;">
      <div class="card" style="text-align:center;padding:12px;">
        <div id="totalStudents" style="font-size:22px;font-weight:800;color:var(--primary);">-</div>
        <div style="font-size:11px;color:var(--text-secondary);">On Board</div>
      </div>
      <div class="card" style="text-align:center;padding:12px;">
        <div id="topScore" style="font-size:22px;font-weight:800;color:var(--success);">-</div>
        <div style="font-size:11px;color:var(--text-secondary);">Top Score</div>
      </div>
      <div class="card" style="text-align:center;padding:12px;">
        <div id="topStreak" style="font-size:22px;font-weight:800;color:var(--warning);">-🔥</div>
        <div style="font-size:11px;color:var(--text-secondary);">Top Streak</div>
      </div>
    </div>

    <div id="leaderLoader">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
    <div id="leaderList" class="card-list" style="display:none;"></div>
    <div id="leaderEmpty" class="empty-state" style="display:none;">
      <div class="empty-state-icon">🏆</div>
      <h3>No data yet</h3>
      <p>Students need to log in and earn points first</p>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/admin/leaderboard-admin.js"></script>
</body>
</html>
