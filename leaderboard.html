<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><link rel="icon" type="image/png" href="/assets/icons/favicon.png"/>
  <meta name="theme-color" content="#1565C0"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard — Nishchay Academy</title><link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <header class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <button onclick="window.location.href='index.html'" style="background:rgba(255,255,255,0.15);border:none;color:white;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:18px;">←</button>
      <div class="header-logo">Leader<span>board</span></div>
    </div>
    <div id="authBtn"></div>
  </header>
  <main class="page-container">
    <div style="margin-top:8px;margin-bottom:16px;"><h1 class="page-title">🏆 Leaderboard</h1><p class="page-subtitle">Top students ranked by points earned</p></div>
    <div style="display:flex;background:var(--bg);border-radius:var(--radius-sm);padding:4px;margin-bottom:20px;gap:4px;">
      <button id="tab-weekly" onclick="switchTab('weekly')" style="flex:1;padding:8px 4px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;background:var(--primary);color:white;">This Week</button>
      <button id="tab-monthly" onclick="switchTab('monthly')" style="flex:1;padding:8px 4px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;background:transparent;color:var(--text-secondary);">This Month</button>
      <button id="tab-alltime" onclick="switchTab('alltime')" style="flex:1;padding:8px 4px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;background:transparent;color:var(--text-secondary);">All Time</button>
    </div>
    <div id="podiumSection" style="display:none;margin-bottom:20px;">
      <div style="display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:0 8px;">
        <div style="flex:1;text-align:center;"><div style="font-size:28px;">🥈</div><div style="background:white;border:1.5px solid var(--border);border-radius:var(--radius-md);padding:10px 6px;margin-top:4px;"><div id="p2name" style="font-size:12px;font-weight:700;"></div><div id="p2pts" style="font-size:11px;color:var(--text-secondary);"></div><div id="p2dist" style="font-size:10px;color:var(--text-secondary);"></div></div></div>
        <div style="flex:1;text-align:center;"><div style="font-size:36px;">🥇</div><div style="background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:var(--radius-md);padding:12px 6px;margin-top:4px;"><div id="p1name" style="font-size:13px;font-weight:800;color:#92400e;"></div><div id="p1pts" style="font-size:13px;font-weight:800;color:#d97706;"></div><div id="p1dist" style="font-size:10px;color:#92400e;"></div></div></div>
        <div style="flex:1;text-align:center;"><div style="font-size:24px;">🥉</div><div style="background:white;border:1.5px solid var(--border);border-radius:var(--radius-md);padding:10px 6px;margin-top:4px;"><div id="p3name" style="font-size:12px;font-weight:700;"></div><div id="p3pts" style="font-size:11px;color:var(--text-secondary);"></div><div id="p3dist" style="font-size:10px;color:var(--text-secondary);"></div></div></div>
      </div>
    </div>
    <div id="myRankCard" style="display:none;margin-bottom:16px;"><div style="background:#eff6ff;border:1.5px solid var(--primary);border-radius:var(--radius-md);padding:14px;"><div style="display:flex;align-items:center;gap:12px;"><div id="myRankNum" style="font-size:22px;font-weight:800;color:var(--primary);min-width:40px;text-align:center;">#-</div><div style="flex:1;"><p style="font-size:14px;font-weight:700;">Your Rank</p><p id="myRankPts" style="font-size:12px;color:var(--primary);font-weight:600;margin-top:2px;"></p></div><div style="font-size:22px;">🎯</div></div></div></div>
    <div id="leaderLoader"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div>
    <div id="leaderList" class="card-list" style="display:none;"></div>
    <div id="leaderEmpty" class="empty-state" style="display:none;"><div class="empty-state-icon">🏆</div><h3>No Rankings Yet</h3><p>Be the first to earn points!</p></div>
  </main>
  <nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Home</button>
    <button class="nav-item" onclick="window.location.href='practice.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Practice</button>
    <button class="nav-item" onclick="window.location.href='test.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>Tests</button>
    <button class="nav-item" onclick="window.location.href='my-results.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Results</button>
    <button class="nav-item" onclick="window.location.href='profile.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</button>
  </nav>
  <div class="toast-container" id="toastContainer"></div>
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/leaderboard.js"></script>
</body>
</html>
