<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/png" href="/assets/icons/favicon.png"/>
  <meta name="theme-color" content="#1565C0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard — Nishchay Academy</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <header class="header">
    <div class="header-logo">Leader<span>board</span></div>
    <div class="header-actions"><div id="authBtn"></div></div>
  </header>

  <main class="page-container">

    <div style="margin-top:8px;margin-bottom:16px;">
      <h1 class="page-title">🏆 Leaderboard</h1>
      <p class="page-subtitle">Top students ranked by points</p>
    </div>

    <!-- Tab Switcher -->
    <div style="display:flex;background:var(--bg);border-radius:var(--radius-sm);
                padding:4px;margin-bottom:20px;gap:4px;">
      <button onclick="switchTab('weekly')" id="tab-weekly"
        class="tab-btn tab-active" style="flex:1;">This Week</button>
      <button onclick="switchTab('monthly')" id="tab-monthly"
        class="tab-btn" style="flex:1;">This Month</button>
      <button onclick="switchTab('alltime')" id="tab-alltime"
        class="tab-btn" style="flex:1;">All Time</button>
    </div>

    <!-- Top 3 Podium -->
    <div id="podiumSection" style="display:none;margin-bottom:20px;">
      <div style="display:flex;align-items:flex-end;justify-content:center;gap:8px;
                  padding:0 8px;">
        <!-- 2nd Place -->
        <div id="podium2" style="flex:1;text-align:center;">
          <div style="font-size:28px;">🥈</div>
          <div style="background:white;border-radius:var(--radius-md);
                      padding:10px 6px;border:1.5px solid var(--border);
                      margin-top:4px;">
            <div id="p2name" style="font-size:12px;font-weight:700;color:var(--text-primary);"></div>
            <div id="p2pts" style="font-size:11px;color:var(--text-secondary);"></div>
            <div id="p2dist" style="font-size:10px;color:var(--text-secondary);"></div>
          </div>
        </div>
        <!-- 1st Place -->
        <div id="podium1" style="flex:1;text-align:center;">
          <div style="font-size:36px;">🥇</div>
          <div style="background:linear-gradient(135deg,#fef3c7,#fde68a);
                      border-radius:var(--radius-md);padding:12px 6px;
                      border:1.5px solid #f59e0b;margin-top:4px;">
            <div id="p1name" style="font-size:12px;font-weight:800;color:#92400e;"></div>
            <div id="p1pts" style="font-size:13px;font-weight:800;color:#d97706;"></div>
            <div id="p1dist" style="font-size:10px;color:#92400e;"></div>
          </div>
        </div>
        <!-- 3rd Place -->
        <div id="podium3" style="flex:1;text-align:center;">
          <div style="font-size:24px;">🥉</div>
          <div style="background:white;border-radius:var(--radius-md);
                      padding:10px 6px;border:1.5px solid var(--border);
                      margin-top:4px;">
            <div id="p3name" style="font-size:12px;font-weight:700;color:var(--text-primary);"></div>
            <div id="p3pts" style="font-size:11px;color:var(--text-secondary);"></div>
            <div id="p3dist" style="font-size:10px;color:var(--text-secondary);"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- My Rank Card -->
    <div id="myRankCard" style="display:none;margin-bottom:16px;">
      <div class="card" style="background:var(--primary-light);border-color:var(--primary);">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-size:22px;font-weight:800;color:var(--primary);
                      min-width:36px;text-align:center;"
               id="myRankNum">#-</div>
          <div style="flex:1;">
            <p style="font-size:14px;font-weight:700;color:var(--text-primary);">
              Your Rank</p>
            <p id="myRankPts" style="font-size:12px;color:var(--primary);font-weight:600;"></p>
          </div>
          <div style="font-size:20px;">🎯</div>
        </div>
      </div>
    </div>

    <!-- Full List -->
    <div id="leaderLoader">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>

    <div id="leaderList" class="card-list" style="display:none;"></div>

    <div id="leaderEmpty" class="empty-state" style="display:none;">
      <div class="empty-state-icon">🏆</div>
      <h3>No Rankings Yet</h3>
      <p>Be the first to earn points and top the chart!</p>
    </div>

  </main>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>Home
    </button>
    <button class="nav-item" onclick="window.location.href='practice.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>Practice
    </button>
    <button class="nav-item" onclick="window.location.href='test.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
      </svg>Tests
    </button>
    <button class="nav-item" onclick="window.location.href='my-results.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>Results
    </button>
    <button class="nav-item active" onclick="window.location.href='leaderboard.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="18,15 12,9 6,15"/>
        <line x1="12" y1="9" x2="12" y2="21"/>
        <path d="M3 5h18"/>
      </svg>Ranks
    </button>
  </nav>

  <div class="toast-container" id="toastContainer"></div>
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/leaderboard.js"></script>
</body>
</html>
