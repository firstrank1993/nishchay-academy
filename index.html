<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nishchay Academy — Gujarat Exam Preparation</title>
  <meta name="description" content="Prepare for Gujarat Government Exams — GPSC, GPSSB, GSSSB with topic-wise MCQs, PYQs and Mock Tests."/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-logo">Nishchay <span>Academy</span></div>
    <div class="header-actions">
      <div id="authBtn"></div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="page-container">

    <!-- Welcome Banner -->
    <div id="welcomeBanner" style="
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: var(--radius-lg);
      padding: 20px;
      color: white;
      margin-bottom: 24px;
      margin-top: 8px;
    ">
      <p style="font-size:13px; opacity:0.85; margin-bottom:4px;">Welcome to</p>
      <h1 style="font-size:22px; font-weight:700; margin-bottom:6px;">Nishchay Academy 🎯</h1>
      <p style="font-size:13px; opacity:0.85;">Gujarat Government Exam Preparation Platform</p>
    </div>

    <!-- Exam Bodies Section -->
    <div class="section-header">
      <h2 class="section-title">Select Exam Body</h2>
    </div>

    <!-- Loading Skeletons (shown while data loads) -->
    <div id="skeletonLoader" class="card-list">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>

    <!-- Exam Bodies List (filled by JavaScript) -->
    <div id="examBodiesList" class="card-list" style="display:none;"></div>

    <!-- Empty State (shown if no exam bodies exist) -->
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="empty-state-icon">📚</div>
      <h3>Coming Soon</h3>
      <p>Exam content is being added. Check back soon!</p>
    </div>

  </main>

  <!-- BOTTOM NAVIGATION -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      Home
    </button>
    <button class="nav-item" onclick="window.location.href='practice.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      Practice
    </button>
    <button class="nav-item" onclick="window.location.href='test.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      Tests
    </button>
    <button class="nav-item" onclick="window.location.href='my-results.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      Results
    </button>
    <button class="nav-item" onclick="window.location.href='profile.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </button>
  </nav>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- JAVASCRIPT -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/home.js"></script>

</body>
</html>
