<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/assets/icons/icon-180.png"/>
  <link rel="icon" type="image/png" href="/assets/icons/favicon.png"/>
  <meta name="theme-color" content="#1565C0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Nishchay Academy"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us — Nishchay Academy</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <header class="header">
    <div style="display:flex; align-items:center; gap:10px;">
      <button onclick="window.history.back()" style="background:rgba(255,255,255,0.15);border:none;color:white;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;">←</button>
      <div class="header-logo">Contact <span>Us</span></div>
    </div>
  </header>

  <main class="page-container">

    <div style="margin-top:8px; margin-bottom:20px;">
      <h1 class="page-title">Contact Us</h1>
      <p class="page-subtitle">We are here to help you</p>
    </div>

    <!-- Contact Cards -->
    <div class="card-list" style="margin-bottom:24px;">

      <div class="card" style="display:flex; align-items:center; gap:14px; cursor:pointer;"
           onclick="window.open('mailto:support@nishchayacademy.com')">
        <div style="width:48px; height:48px; border-radius:12px; background:var(--primary-light); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0;">
          📧
        </div>
        <div>
          <div style="font-size:14px; font-weight:700;">Email Us</div>
          <div style="font-size:12px; color:var(--text-secondary);">support@nishchayacademy.com</div>
        </div>
      </div>

      <div class="card" style="display:flex; align-items:center; gap:14px; cursor:pointer;"
           onclick="window.open('https://wa.me/919999999999')">
        <div style="width:48px; height:48px; border-radius:12px; background:#DCFCE7; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0;">
          💬
        </div>
        <div>
          <div style="font-size:14px; font-weight:700;">WhatsApp</div>
          <div style="font-size:12px; color:var(--text-secondary);">Message us on WhatsApp</div>
        </div>
      </div>

      <div class="card" style="display:flex; align-items:center; gap:14px; cursor:pointer;"
           onclick="window.open('https://t.me/nishchayacademy')">
        <div style="width:48px; height:48px; border-radius:12px; background:#E0F2FE; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0;">
          ✈️
        </div>
        <div>
          <div style="font-size:14px; font-weight:700;">Telegram</div>
          <div style="font-size:12px; color:var(--text-secondary);">Join our Telegram channel</div>
        </div>
      </div>

    </div>

    <!-- Feedback Form -->
    <div class="card" style="margin-bottom:24px;">
      <h2 style="font-size:15px; font-weight:700; margin-bottom:14px;">Send Feedback</h2>

      <input id="feedbackName" type="text" placeholder="Your name"
        style="width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:14px; margin-bottom:10px; font-family:Inter,sans-serif;"/>

      <input id="feedbackEmail" type="email" placeholder="Your email"
        style="width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:14px; margin-bottom:10px; font-family:Inter,sans-serif;"/>

      <select id="feedbackType"
        style="width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:14px; margin-bottom:10px; font-family:Inter,sans-serif;">
        <option value="">Select type</option>
        <option value="bug">Bug Report</option>
        <option value="suggestion">Suggestion</option>
        <option value="content">Content Issue</option>
        <option value="other">Other</option>
      </select>

      <textarea id="feedbackMessage" placeholder="Your message..." rows="4"
        style="width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:14px; margin-bottom:14px; font-family:Inter,sans-serif; resize:vertical;"></textarea>

      <button onclick="sendFeedback()" class="btn btn-primary btn-full" id="sendFeedbackBtn">
        Send Feedback
      </button>

      <div id="feedbackSuccess" style="display:none; margin-top:12px; padding:12px; background:#DCFCE7; border-radius:var(--radius-sm); font-size:13px; color:var(--success); text-align:center;">
        ✅ Thank you! Your feedback has been sent.
      </div>
    </div>

    <!-- Links -->
    <div style="display:flex; gap:12px; justify-content:center; margin-bottom:24px;">
      <a href="about.html" style="font-size:13px; color:var(--primary);">About Us</a>
      <span style="color:var(--border);">|</span>
      <a href="privacy.html" style="font-size:13px; color:var(--primary);">Privacy Policy</a>
    </div>

  </main>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      Home
    </button>
    <button class="nav-item" onclick="window.location.href='practice.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Practice
    </button>
    <button class="nav-item" onclick="window.location.href='test.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
      Tests
    </button>
    <button class="nav-item" onclick="window.location.href='my-results.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Results
    </button>
    <button class="nav-item" onclick="window.location.href='profile.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </button>
  </nav>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, addDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    window.sendFeedback = async function() {
      const name = document.getElementById('feedbackName').value.trim();
      const email = document.getElementById('feedbackEmail').value.trim();
      const type = document.getElementById('feedbackType').value;
      const message = document.getElementById('feedbackMessage').value.trim();

      if (!name || !message) {
        alert('Please enter your name and message.');
        return;
      }

      const btn = document.getElementById('sendFeedbackBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        await addDoc(collection(db, 'feedback'), {
          name, email, type, message,
          createdAt: serverTimestamp()
        });
        document.getElementById('feedbackSuccess').style.display = 'block';
        document.getElementById('feedbackName').value = '';
        document.getElementById('feedbackEmail').value = '';
        document.getElementById('feedbackType').value = '';
        document.getElementById('feedbackMessage').value = '';
      } catch(e) {
        alert('Error sending feedback. Please try again.');
        console.error(e);
      }

      btn.disabled = false;
      btn.textContent = 'Send Feedback';
    };
  </script>

</body>
</html>
