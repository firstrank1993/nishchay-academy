<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/assets/icons/icon-180.png"/>
  <link rel="icon" type="image/png" href="/assets/icons/favicon.png"/>
  <meta name="theme-color" content="#1565C0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Nishchay Academy"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Result — Nishchay Academy</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header class="header">
    <div style="display:flex; align-items:center; gap:10px;">
      <button onclick="window.location.href='my-results.html'" style="background:rgba(255,255,255,0.15);border:none;color:white;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;">←</button>
      <div class="header-logo">Test <span>Result</span></div>
    </div>
    <div class="header-actions"><div id="authBtn"></div></div>
  </header>

  <main class="page-container">

    <div id="resultLoader">
      <div class="skeleton" style="height:200px; margin-bottom:16px; border-radius:var(--radius-lg);"></div>
      <div class="skeleton skeleton-card" style="margin-bottom:12px;"></div>
      <div class="skeleton skeleton-card"></div>
    </div>

    <div id="resultContent" style="display:none;">

      <!-- Score Banner -->
      <div class="welcome-banner" style="margin-top:8px; margin-bottom:20px; text-align:center;" id="resultBanner">
        <p style="font-size:13px; opacity:0.8; margin-bottom:4px;" id="resultTestTitle"></p>
        <div style="font-size:52px; font-weight:800; margin:8px 0;" id="resultScore"></div>
        <p style="font-size:14px; opacity:0.85;" id="resultMarks"></p>
      </div>

      <!-- Stats Grid -->
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;" id="statsGrid">
        <div class="card" style="text-align:center;">
          <div style="font-size:26px; font-weight:800; color:var(--success);" id="resultCorrect"></div>
          <div style="font-size:12px; color:var(--text-secondary);">Correct</div>
        </div>
        <div class="card" style="text-align:center;">
          <div style="font-size:26px; font-weight:800; color:var(--danger);" id="resultWrong"></div>
          <div style="font-size:12px; color:var(--text-secondary);">Wrong</div>
        </div>
        <div class="card" style="text-align:center;">
          <div style="font-size:26px; font-weight:800; color:var(--text-secondary);" id="resultUnattempted"></div>
          <div style="font-size:12px; color:var(--text-secondary);">Skipped</div>
        </div>
        <div class="card" style="text-align:center;">
          <div style="font-size:26px; font-weight:800; color:var(--primary);" id="resultAccuracy"></div>
          <div style="font-size:12px; color:var(--text-secondary);">Accuracy</div>
        </div>
      </div>

      <!-- Chart -->
      <div class="card" style="margin-bottom:20px;">
        <h3 style="font-size:15px; font-weight:700; margin-bottom:14px;">Performance Overview</h3>
        <canvas id="resultChart" height="200"></canvas>
      </div>

      <!-- Action Buttons -->
      <div style="display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap;">
        <button onclick="window.location.href='test.html'" class="btn btn-primary" style="flex:1;">
          Take Another Test
        </button>
        <button onclick="window.location.href='index.html'" class="btn btn-outline" style="flex:1;">
          Go Home
        </button>
      </div>

      <!-- Rank Board Button -->
      <button id="viewRankBtn" style="display:none; margin-bottom:20px;" class="btn btn-full"
        style="background:#F3E8FF;color:#7C3AED;border:1.5px solid #DDD6FE;">
        🏆 View Rank Board
      </button>

      <!-- Answer Review -->
      <div class="section-header">
        <h2 class="section-title">Answer Review</h2>
      </div>
      <div id="answerReview" class="card-list"></div>

    </div>

  </main>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      Home
    </button>
    <button class="nav-item" onclick="window.location.href='practice.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Practice
    </button>
    <button class="nav-item" onclick="window.location.href='test.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
      Tests
    </button>
    <button class="nav-item active" onclick="window.location.href='my-results.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Results
    </button>
    <button class="nav-item" onclick="window.location.href='profile.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </button>
  </nav>

  <div class="toast-container" id="toastContainer"></div>
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/result.js"></script>
</body>
</html>
