<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rank Board — Nishchay Academy</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <header class="header">
    <div style="display:flex; align-items:center; gap:10px;">
      <button onclick="window.history.back()" style="background:rgba(255,255,255,0.15);border:none;color:white;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;">←</button>
      <div class="header-logo">🏆 <span>Rank Board</span></div>
    </div>
    <div class="header-actions">
      <button onclick="shareRankBoard()" class="btn btn-sm"
        style="background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.3);">
        📤 Share
      </button>
    </div>
  </header>

  <main class="page-container">

    <!-- Test Selector -->
    <div style="margin:12px 0 16px;">
      <select id="testSelect" onchange="loadRankBoard()"
        style="width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:14px; font-family:Inter,sans-serif; background:white;">
        <option value="">Select a test to see rankings</option>
      </select>
    </div>

    <!-- Loading -->
    <div id="rankLoader" style="display:none;">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>

    <!-- Empty -->
    <div id="rankEmpty" class="empty-state" style="display:none;">
      <div class="empty-state-icon">🏆</div>
      <h3>No Results Yet</h3>
      <p>Be the first to attempt this test!</p>
    </div>

    <!-- Rank Board -->
    <div id="rankContent" style="display:none;">

      <!-- Test Info Banner -->
      <div class="welcome-banner" style="margin-bottom:20px; text-align:center;">
        <p style="font-size:12px; opacity:0.8; margin-bottom:4px;">Rank Board</p>
        <h2 style="font-size:18px; font-weight:800; margin-bottom:4px;" id="rankTestTitle"></h2>
        <p style="font-size:13px; opacity:0.85;" id="rankTestInfo"></p>
      </div>

      <!-- Top 3 Podium -->
      <div id="podiumSection" style="margin-bottom:24px; display:none;">
        <div style="display:flex; align-items:flex-end; justify-content:center; gap:12px; padding:16px 0;">

          <!-- 2nd Place -->
          <div id="rank2" style="text-align:center; flex:1;">
            <div style="font-size:28px; margin-bottom:6px;">🥈</div>
            <div style="background:linear-gradient(135deg,#94A3B8,#64748B); border-radius:var(--radius-md) var(--radius-md) 0 0; padding:16px 8px; color:white; min-height:80px; display:flex; flex-direction:column; justify-content:flex-end;">
              <div style="font-size:12px; font-weight:700;" id="rank2Name">-</div>
              <div style="font-size:11px; opacity:0.85;" id="rank2Score">-</div>
            </div>
          </div>

          <!-- 1st Place -->
          <div id="rank1" style="text-align:center; flex:1;">
            <div style="font-size:36px; margin-bottom:6px;">🥇</div>
            <div style="background:linear-gradient(135deg,#F59E0B,#D97706); border-radius:var(--radius-md) var(--radius-md) 0 0; padding:20px 8px; color:white; min-height:110px; display:flex; flex-direction:column; justify-content:flex-end;">
              <div style="font-size:13px; font-weight:800;" id="rank1Name">-</div>
              <div style="font-size:12px; opacity:0.85;" id="rank1Score">-</div>
            </div>
          </div>

          <!-- 3rd Place -->
          <div id="rank3" style="text-align:center; flex:1;">
            <div style="font-size:24px; margin-bottom:6px;">🥉</div>
            <div style="background:linear-gradient(135deg,#CD7C3E,#A0522D); border-radius:var(--radius-md) var(--radius-md) 0 0; padding:12px 8px; color:white; min-height:60px; display:flex; flex-direction:column; justify-content:flex-end;">
              <div style="font-size:11px; font-weight:700;" id="rank3Name">-</div>
              <div style="font-size:10px; opacity:0.85;" id="rank3Score">-</div>
            </div>
          </div>

        </div>
      </div>

      <!-- Full Rankings Table -->
      <div class="section-header">
        <h2 class="section-title">Full Rankings</h2>
        <span id="totalParticipants" style="font-size:12px; color:var(--text-secondary);"></span>
      </div>

      <div id="rankList" class="card-list"></div>

    </div>

  </main>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      Home
    </button>
    <button class="nav-item" onclick="window.location.href='practice.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Practice
    </button>
    <button class="nav-item" onclick="window.location.href='test.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
      Tests
    </button>
    <button class="nav-item" onclick="window.location.href='my-results.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Results
    </button>
    <button class="nav-item" onclick="window.location.href='profile.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </button>
  </nav>

  <div class="toast-container" id="toastContainer"></div>
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/rankboard.js"></script>
</body>
</html>
